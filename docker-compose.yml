services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: duediligence-backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - doc_data:/data/documents
      - chroma_data:/data/embeddings/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: duediligence-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  doc_data:
  chroma_data:
